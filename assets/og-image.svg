<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="홍길동 - Frontend Developer">
  <!-- 배경 -->
  <rect width="1200" height="630" fill="#09090d"/>
  <!-- 코랄 글로우 orb -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e85d3a" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#e85d3a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="980" cy="140" r="360" fill="url(#glow)"/>
  <!-- 상단 라벨 -->
  <text x="100" y="250" font-family="DM Sans, sans-serif" font-size="34" font-weight="600" fill="#e85d3a" letter-spacing="6">FRONTEND DEVELOPER</text>
  <!-- 이름 -->
  <text x="98" y="360" font-family="Syne, Arial, sans-serif" font-size="120" font-weight="800" fill="#f2f2f7">홍길동</text>
  <!-- 한 줄 소개 -->
  <text x="100" y="430" font-family="DM Sans, sans-serif" font-size="34" font-weight="400" fill="#76768a">사용자 중심 인터페이스를 만드는 웹 프론트엔드 개발자</text>
  <!-- 코드 브래킷 장식 -->
  <text x="1050" y="540" font-family="monospace" font-size="160" font-weight="800" fill="#e85d3a" opacity="0.7" text-anchor="middle">&lt;/&gt;</text>
  <!-- 하단 구분선 -->
  <rect x="100" y="480" width="60" height="5" rx="2" fill="#e85d3a"/>
  <text x="100" y="535" font-family="DM Sans, sans-serif" font-size="26" font-weight="500" fill="#5b5b6e">kevinsung456.github.io/claude-profile</text>
</svg>
